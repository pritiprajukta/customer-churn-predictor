<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login — ChurnAI Pro</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Segoe UI',sans-serif;
            background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
            min-height:100vh;
            display:flex; align-items:center; justify-content:center;
        }
        .card {
            background:rgba(255,255,255,0.05);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:24px;
            padding:50px 40px;
            width:420px;
            animation:fadeIn 0.6s ease;
        }
        .logo {
            text-align:center; margin-bottom:30px;
        }
        .logo h1 {
            font-size:28px;
            background:linear-gradient(90deg,#00d2ff,#7b2ff7);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }
        .logo p { color:rgba(255,255,255,0.5); font-size:14px; margin-top:5px; }
        .form-group { margin-bottom:18px; }
        .form-group label {
            display:block; color:rgba(255,255,255,0.7);
            font-size:13px; margin-bottom:6px;
            text-transform:uppercase; letter-spacing:0.5px;
        }
        .form-group input {
            width:100%; padding:13px 16px;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.15);
            border-radius:12px; color:white;
            font-size:14px; outline:none; transition:all 0.3s;
        }
        .form-group input:focus {
            border-color:#00d2ff;
            box-shadow:0 0 15px rgba(0,210,255,0.2);
        }
        .btn {
            width:100%; padding:14px;
            background:linear-gradient(90deg,#00d2ff,#7b2ff7);
            border:none; border-radius:12px;
            color:white; font-size:16px;
            font-weight:700; cursor:pointer;
            transition:all 0.3s; margin-top:8px;
        }
        .btn:hover {
            transform:translateY(-2px);
            box-shadow:0 10px 30px rgba(0,210,255,0.4);
        }
        .error {
            background:rgba(255,65,108,0.2);
            border:1px solid rgba(255,65,108,0.4);
            color:#ff416c; padding:12px;
            border-radius:10px; margin-bottom:18px;
            font-size:13px; text-align:center;
        }
        .link {
            text-align:center; margin-top:20px;
            color:rgba(255,255,255,0.5); font-size:13px;
        }
        .link a { color:#00d2ff; text-decoration:none; }
        .divider {
            text-align:center; color:rgba(255,255,255,0.3);
            margin:20px 0; font-size:13px;
        }
        @keyframes fadeIn {
            from{opacity:0;transform:translateY(-20px)}
            to{opacity:1;transform:translateY(0)}
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <h1>🔍 ChurnAI Pro</h1>
        <p>Customer Churn Intelligence Platform</p>
    </div>

    {% if error %}
    <div class="error">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username"
                   placeholder="Enter username" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password"
                   placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn">🚀 Login</button>
    </form>

    <div class="divider">— or —</div>
    <div class="link">
        Don't have an account?
        <a href="/signup">Sign up here</a>
    </div>
</div>
</body>
</html>
